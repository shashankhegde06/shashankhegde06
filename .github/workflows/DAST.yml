name: DAST Scan Workflow

on:
  push:
    branches:
      - main

jobs:
  security_scan:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Download ZAP
        run: |
          Invoke-WebRequest -Uri 'https://github.com/zaproxy/zaproxy/releases/download/v2.11.0/ZAP_2.11.0_Windows.exe' -OutFile 'ZAP_2.11.0_Windows.exe'
          Start-Process -FilePath 'ZAP_2.11.0_Windows.exe' -ArgumentList '/S' -Wait

      - name: Run ZAP Scan
        run: Start-Process -FilePath 'C:\Program Files\OWASP\Zed Attack Proxy\zap.bat' -ArgumentList '-daemon -port 8080 -config api.key=ubiu6uordtpp2qqm51hvlbqcuq' -Wait

      # Add steps to test your application with ZAP, e.g., using a PowerShell script.

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v2
        with:
          name: zap-report
          path: C:\Users\Dell\Downloads\ZAP_2_14_0_windows.exe\report
