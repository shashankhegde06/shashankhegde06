name: ZAP Full Scan

on:
  push:
    branches: [security]

runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Set up Python
    uses: actions/setup-python@v3
    with:
      python-version: 3.12

  - name: Install dependencies
    run: |
      sudo pip install -r requirements.txt
      sudo python app.py &

  - name: ZAP Scan
    uses: zaproxy/action-full-scan@v0.7.0
    with:
      target: 'https://github.com/shashankhegde06/CompTry'
      artifact_name: 'DAST-results-zap_scan'

  - name: Exit ZAP
    run: exit
