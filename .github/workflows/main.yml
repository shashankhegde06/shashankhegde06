name: DAST Testing Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Add steps to build and deploy your application for Windows.
      # For example, if you're using a .NET project:
      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 5.0

      - name: Build
        run: dotnet build --configuration Release

      # Add additional build and deploy steps as needed.

  security_scan:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Download ZAP
        run: |
          Invoke-WebRequest -Uri 'https://github.com/zaproxy/zaproxy/releases/download/v2.11.0/ZAP_2.11.0_Windows.exe' -OutFile 'ZAP_2.11.0_Windows.exe'
          Start-Process -FilePath 'ZAP_2.11.0_Windows.exe' -ArgumentList '/S' -Wait

      - name: Run ZAP Scan
        run: Start-Process -FilePath 'C:\Program Files\OWASP\Zed Attack Proxy\zap.bat' -ArgumentList '-daemon -port 8080 -config api.disablekey=true' -Wait

      # Add steps to test your application with ZAP, e.g., using a PowerShell script.

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v2
        with:
          name: zap-report
          path: C:\path\to\zap\report

  deploy:
    runs-on: windows-latest

    # Add steps to deploy your application for Windows.

